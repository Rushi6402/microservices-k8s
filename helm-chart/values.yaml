images:
  adservice:
    repository: docker.io/infrawave/adservice
    tag: sha-e1e77bfa
  cartservice:
    repository: ghcr.io/laxmikantagiri/microservices-demo/cartservice
    tag: v0.10.4
  checkoutservice:
    repository: docker.io/infrawave/checkoutservice
    tag: sha-cd2c9458
  currencyservice:
    repository: docker.io/infrawave/currencyservice
    tag: sha-61b8440d
  emailservice:
    repository: ghcr.io/laxmikantagiri/microservices-demo/emailservice
    tag: v0.10.4
  frontend:
    repository: docker.io/infrawave/frontend
    tag: sha-938d7cf0
  loadgenerator:
    repository: ghcr.io/laxmikantagiri/microservices-demo/loadgenerator
    tag: v0.10.4
  paymentservice:
    repository: ghcr.io/laxmikantagiri/microservices-demo/paymentservice
    tag: v0.10.4
  productcatalogservice:
    repository: ghcr.io/laxmikantagiri/microservices-demo/productcatalogservice
    tag: v0.10.4
  recommendationservice:
    repository: ghcr.io/laxmikantagiri/microservices-demo/recommendationservice
    tag: v0.10.4
  shippingservice:
    repository: ghcr.io/laxmikantagiri/microservices-demo/shippingservice
    tag: v0.10.4

serviceAccounts:
  create: true
  annotations: {}
  annotationsOnlyForCartservice: false

networkPolicies:
  create: false

sidecars:
  create: false

authorizationPolicies:
  create: false

opentelemetryCollector:
  create: false
  name: opentelemetrycollector
  projectId: "PROJECT_ID"

googleCloudOperations:
  profiler: false
  tracing: false
  metrics: false

seccompProfile:
  enable: false
  type: RuntimeDefault

securityContext:
  enable: true

adService:
  create: true
  name: adservice

cartService:
  create: true
  name: cartservice

checkoutService:
  create: true
  name: checkoutservice

currencyService:
  create: true
  name: currencyservice

emailService:
  create: true
  name: emailservice

frontend:
  create: true
  name: frontend
  externalService: false
  cymbalBranding: false
  platform: local
  singleSharedSession: false
  virtualService:
    create: false

loadGenerator:
  create: true
  name: loadgenerator
  checkFrontendInitContainer: true

paymentService:
  create: true
  name: paymentservice

productCatalogService:
  create: true
  name: productcatalogservice
  extraLatency: ""

recommendationService:
  create: true
  name: recommendationservice

shippingService:
  create: true
  name: shippingservice

cartDatabase:
  type: redis
  connectionString: "redis-cart:6379"
  inClusterRedis:
    create: true
    name: redis-cart
    publicRepository: true
  externalRedisTlsOrigination:
    enable: false
